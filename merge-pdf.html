<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge PDF - Passion Tools</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        :root {
            /* Brand Colors */
            --red: #ef4444;
            --purple: #a855f7;
            --blue: #3b82f6;
            --blue-dark: #2563eb;
            --green: #22c55e;
            
            /* Light Mode UI Colors */
            --bg-color: #f9fafb;
            --card-bg: #ffffff;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --border-color: #e5e7eb;
            --hover-gray: #f3f4f6;
            --header-bg: rgba(255, 255, 255, 0.95);
            --footer-bg: #111827;
            --preview-bg: #f3f4f6;
            --logo-passion: #1f2937;
            
            /* Shadows & Transitions */
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }

        /* Dark Mode Override */
        [data-theme="dark"] {
            --bg-color: #020617;
            --card-bg: #111827;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: #1e293b;
            --hover-gray: #1e293b;
            --header-bg: rgba(15, 23, 42, 0.95);
            --footer-bg: #020617;
            --preview-bg: #1e293b;
            --logo-passion: #f8fafc;
            
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
        }

        /* --- Header --- */
        header {
            background-color: var(--header-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            transition: var(--transition);
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { text-decoration: none; display: flex; align-items: center; gap: 1px; }
        .logo-text { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; display: block; }
        .logo-passion { color: var(--logo-passion); transition: color var(--transition); }
        .logo-tools {
            background: linear-gradient(135deg, var(--red), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 500;
            transition: color var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-link:hover { color: var(--red); }

        .theme-toggle {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: var(--transition);
        }
        .theme-toggle:hover { background: var(--hover-gray); border-color: var(--text-secondary); }

        /* --- Main Layout --- */
        .tool-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px 60px;
            flex: 1;
            width: 100%;
        }

        .tool-header { text-align: center; margin-bottom: 30px; }
        .tool-title { font-size: 32px; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.5px; }
        .tool-subtitle { color: var(--text-secondary); font-size: 16px; transition: color var(--transition); }

        .tool-card {
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            padding: 40px;
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }

        /* --- Upload Area --- */
        .upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 16px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            background-color: var(--preview-bg);
        }
        .upload-area:hover, .upload-area.dragover {
            border-color: var(--blue);
            background-color: rgba(59, 130, 246, 0.05);
        }
        
        .upload-icon { font-size: 48px; color: var(--blue); margin-bottom: 16px; display: block;}
        .upload-text { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
        .upload-subtext { color: var(--text-secondary); font-size: 14px; }
        #fileInput { display: none; }

        /* --- Workspace --- */
        .workspace { display: none; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* File List (SortableJS) */
        .file-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .file-item {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: var(--transition);
            box-shadow: var(--shadow-md);
        }
        .file-item.sortable-ghost { opacity: 0.4; border: 2px dashed var(--blue); background: rgba(59, 130, 246, 0.05); }

        .drag-handle { 
            color: var(--text-secondary); 
            cursor: grab; 
            padding: 4px; 
            font-size: 18px;
            transition: color var(--transition);
        }
        .drag-handle:active { cursor: grabbing; }
        .drag-handle:hover { color: var(--blue); }

        .file-icon { color: var(--red); font-size: 24px; }
        
        .file-info { flex: 1; overflow: hidden; }
        .file-name { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 15px; }
        .file-size { font-size: 13px; color: var(--text-secondary); }

        .btn-trash {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            font-size: 18px;
            transition: var(--transition);
        }
        .btn-trash:hover { background: rgba(239, 68, 68, 0.1); color: var(--red); }

        /* Add More Button */
        .btn-add-more {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 2px dashed var(--border-color);
            background: transparent;
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 32px;
        }
        .btn-add-more:hover {
            border-color: var(--blue);
            color: var(--blue);
            background: rgba(59, 130, 246, 0.05);
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 150px;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            font-family: inherit;
        }

        .btn-primary { background-color: var(--blue); color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
        .btn-primary:hover { background-color: var(--blue-dark); transform: translateY(-2px); }
        .btn-primary:disabled { background-color: var(--text-secondary); cursor: not-allowed; transform: none; box-shadow: none; opacity: 0.7;}

        .btn-download { background-color: var(--green); color: white; box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3); display: none; }
        .btn-download:hover { background-color: #16a34a; transform: translateY(-2px); }

        .btn-reset { background-color: transparent; color: var(--text-primary); border: 1px solid var(--border-color); }
        .btn-reset:hover { background-color: var(--hover-gray); border-color: var(--text-secondary); }

        /* Status */
        .status-msg { margin-top: 20px; font-weight: 500; font-size: 15px; text-align: center; }
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- Footer --- */
        footer {
            background-color: var(--footer-bg);
            color: #94a3b8;
            padding: 30px 20px;
            margin-top: auto;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 14px;
            transition: background-color var(--transition);
        }

        /* --- Responsive Design --- */
        @media (max-width: 600px) {
            .tool-card { padding: 24px 20px; }
            .tool-title { font-size: 26px; }
            .upload-area { padding: 40px 16px; }
            .action-buttons { flex-direction: column; }
            .btn { width: 100%; }
            .nav-link span { display: none; } /* Hides "Back to Tools" text */
        }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo">
                    <span class="logo-text">
                        <span class="logo-passion">Passion</span><span class="logo-tools">Tools</span>
                    </span>
                </a>
                <div class="header-actions">
                    <a href="index.html" class="nav-link" title="Back to Tools">
                        <i class="fas fa-arrow-left"></i> <span>Back to Tools</span>
                    </a>
                    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme" title="Toggle theme">🌙</button>
                </div>
            </div>
        </div>
    </header>

    <main class="tool-container">
        <div class="tool-header">
            <h1 class="tool-title">Merge PDF</h1>
            <p class="tool-subtitle">Combine multiple PDFs into one document instantly. 100% free and secure in your browser.</p>
        </div>

        <div class="tool-card">
            
            <div class="upload-area" id="uploadArea">
                <i class="fas fa-file-pdf upload-icon"></i>
                <div class="upload-text">Click or Drag & Drop PDFs here</div>
                <div class="upload-subtext">Supports multiple PDF files</div>
                <input type="file" id="fileInput" accept="application/pdf" multiple>
            </div>

            <div class="workspace" id="workspace">
                
                <div class="file-list" id="fileList">
                    </div>

                <button class="btn-add-more" id="addMoreBtn">
                    <i class="fas fa-plus"></i> Add more PDFs
                </button>

                <div class="action-buttons">
                    <button class="btn btn-primary" id="mergeBtn" disabled>
                        <i class="fas fa-object-group"></i> Merge PDFs
                    </button>
                    <a href="#" class="btn btn-download" id="downloadBtn" download="merged-document.pdf">
                        <i class="fas fa-download"></i> Download Merged PDF
                    </a>
                    <button class="btn btn-reset" id="resetBtn">
                        <i class="fas fa-redo"></i> Start Over
                    </button>
                </div>

                <div class="status-msg" id="statusMsg"></div>

            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Passion Tools. Secure client-side processing.</p>
        </div>
    </footer>

    <script>
        // --- 1. THEME TOGGLE LOGIC ---
        (function initTheme() {
            const saved = localStorage.getItem('pt-theme');
            if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
            updateToggleIcon();
        })();

        function updateToggleIcon() {
            const btn = document.getElementById('themeToggle');
            if (btn) btn.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙';
        }

        document.getElementById('themeToggle').addEventListener('click', () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
            localStorage.setItem('pt-theme', isDark ? 'light' : 'dark');
            updateToggleIcon();
        });

        // --- 2. MERGE PDF LOGIC ---
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const workspace = document.getElementById('workspace');
        const fileList = document.getElementById('fileList');
        
        const addMoreBtn = document.getElementById('addMoreBtn');
        const mergeBtn = document.getElementById('mergeBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const resetBtn = document.getElementById('resetBtn');
        const statusMsg = document.getElementById('statusMsg');

        let filesArray = [];
        let sortableInstance = null;

        // --- Utility: Format Bytes ---
        function formatBytes(bytes, decimals = 2) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
        }

        // --- Upload Handling ---
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => {
            uploadArea.addEventListener(e, ev => { ev.preventDefault(); ev.stopPropagation(); });
        });
        
        uploadArea.addEventListener('click', () => fileInput.click());
        addMoreBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));
        
        uploadArea.addEventListener('dragover', () => uploadArea.classList.add('dragover'));
        uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
        uploadArea.addEventListener('drop', (e) => { 
            uploadArea.classList.remove('dragover'); 
            handleFiles(e.dataTransfer.files); 
        });

        function handleFiles(files) {
            const newFiles = Array.from(files).filter(file => file.type === 'application/pdf');
            
            if (newFiles.length === 0 && filesArray.length === 0) {
                alert("Please select valid PDF files.");
                return;
            }

            filesArray = [...filesArray, ...newFiles];
            
            // Switch views
            uploadArea.style.display = 'none';
            workspace.style.display = 'block';
            
            // Reset input so the same files can be uploaded again if needed
            fileInput.value = '';
            
            renderFileList();
            updateUIState();
        }

        // --- Render & SortableJS Logic ---
        function renderFileList() {
            fileList.innerHTML = '';
            
            filesArray.forEach((file, index) => {
                const item = document.createElement('div');
                item.className = 'file-item';
                item.dataset.index = index;

                item.innerHTML = `
                    <div class="drag-handle" title="Drag to reorder"><i class="fas fa-grip-vertical"></i></div>
                    <i class="fas fa-file-pdf file-icon"></i>
                    <div class="file-info">
                        <div class="file-name" title="${file.name}">${file.name}</div>
                        <div class="file-size">${formatBytes(file.size)}</div>
                    </div>
                    <button class="btn-trash" onclick="removeFile(${index})" title="Remove file">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                `;
                fileList.appendChild(item);
            });

            // Initialize or Refresh SortableJS
            if (sortableInstance) {
                sortableInstance.destroy();
            }
            
            sortableInstance = new Sortable(fileList, {
                animation: 150,
                handle: '.drag-handle',
                ghostClass: 'sortable-ghost',
                onEnd: function (evt) {
                    // Reorder the underlying array based on drag-and-drop
                    const movedItem = filesArray.splice(evt.oldIndex, 1)[0];
                    filesArray.splice(evt.newIndex, 0, movedItem);
                    // Re-render to ensure onclick indexes remain correct
                    renderFileList(); 
                }
            });
        }

        // Attached to the window so the inline onclick can find it
        window.removeFile = function(index) {
            filesArray.splice(index, 1);
            if (filesArray.length === 0) {
                resetApp();
            } else {
                renderFileList();
                updateUIState();
            }
        };

        function updateUIState() {
            if (filesArray.length >= 2) {
                mergeBtn.disabled = false;
                mergeBtn.innerHTML = `<i class="fas fa-object-group"></i> Merge ${filesArray.length} PDFs`;
            } else {
                mergeBtn.disabled = true;
                mergeBtn.innerHTML = `<i class="fas fa-object-group"></i> Add at least 2 PDFs`;
            }
            
            // Hide download if they start modifying the list again
            downloadBtn.style.display = 'none';
            mergeBtn.style.display = 'flex';
            statusMsg.textContent = '';
        }

        // --- PDF Merging Logic (pdf-lib) ---
        mergeBtn.addEventListener('click', async () => {
            if (filesArray.length < 2) return;

            // UI Loading State
            mergeBtn.disabled = true;
            mergeBtn.innerHTML = '<span class="spinner"></span> Processing...';
            statusMsg.textContent = 'Merging PDFs... This runs entirely in your browser.';
            statusMsg.style.color = 'var(--blue)';

            try {
                // Access PDFLib from window (loaded via CDN)
                const PDFLib = window.PDFLib;
                const mergedPdf = await PDFLib.PDFDocument.create();

                // Loop through array and append pages
                for (let file of filesArray) {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
                    const copiedPages = await mergedPdf.copyPages(pdfDoc, pdfDoc.getPageIndices());
                    copiedPages.forEach((page) => mergedPdf.addPage(page));
                }

                // Serialize the PDFDocument to bytes
                const pdfBytes = await mergedPdf.save();

                // Create Download Blob
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                
                downloadBtn.href = url;
                
                // UI Success State
                mergeBtn.style.display = 'none';
                downloadBtn.style.display = 'flex';
                
                statusMsg.textContent = 'Success! Your merged PDF is ready to download.';
                statusMsg.style.color = 'var(--green)';

            } catch (err) {
                console.error("Merge Error:", err);
                statusMsg.textContent = 'An error occurred while merging. Ensure files are not password protected.';
                statusMsg.style.color = 'var(--red)';
                
                updateUIState(); // Reset button
            }
        });

        // --- Reset Logic ---
        function resetApp() {
            filesArray = [];
            fileInput.value = '';
            uploadArea.style.display = 'block';
            workspace.style.display = 'none';
            downloadBtn.style.display = 'none';
            mergeBtn.style.display = 'flex';
            statusMsg.textContent = '';
        }

        resetBtn.addEventListener('click', resetApp);

    </script>
</body>
</html>
