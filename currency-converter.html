<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Currency Converter — PassionTools</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💱</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    /* ===== Passion Tools Design System ===== */
    :root {
      --red: #ef4444;
      --purple: #a855f7;
      --blue: #3b82f6;
      --blue-dark: #2563eb;
      --green: #22c55e;
      --bg-color: #f9fafb;
      --card-bg: #ffffff;
      --text-primary: #1f2937;
      --text-secondary: #6b7280;
      --border-color: #e5e7eb;
      --input-bg: #f3f4f6;
      --hover-bg: #f3f4f6;
      --shadow-color: rgba(0, 0, 0, 0.08);
      --glass-bg: rgba(255, 255, 255, 0.75);
      --glass-border: rgba(255, 255, 255, 0.3);
      --logo-passion: #1f2937;
      --result-bg: #f0fdf4;
      --result-border: #bbf7d0;
      --dropdown-shadow: 0 10px 40px rgba(0, 0, 0, 0.12);
    }

    [data-theme="dark"] {
      --bg-color: #020617;
      --card-bg: #111827;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --border-color: #1e293b;
      --input-bg: #1e293b;
      --hover-bg: #1e293b;
      --shadow-color: rgba(0, 0, 0, 0.3);
      --glass-bg: rgba(17, 24, 39, 0.75);
      --glass-border: rgba(30, 41, 59, 0.5);
      --logo-passion: #f8fafc;
      --result-bg: rgba(34, 197, 94, 0.08);
      --result-border: rgba(34, 197, 94, 0.2);
      --dropdown-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
    }

    /* ===== Global Reset ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-primary);
      transition: background-color 0.3s ease, color 0.3s ease;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .app-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ===== Header ===== */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
      padding: 0 1.5rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.3s ease;
    }

    .logo {
      display: flex;
      align-items: center;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      cursor: pointer;
      text-decoration: none;
    }

    .logo-passion {
      color: var(--logo-passion);
      transition: color 0.3s ease;
    }

    .logo-tools {
      background: linear-gradient(135deg, var(--red), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .back-link {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: color 0.3s ease;
      cursor: pointer;
    }

    .back-link:hover { color: var(--red); }

    .theme-toggle {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: 1px solid var(--border-color);
      background: var(--card-bg);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.1rem;
      transition: all 0.3s ease;
    }

    .theme-toggle:hover {
      border-color: var(--blue);
      background: var(--hover-bg);
      transform: scale(1.05);
    }

    /* ===== Page Layout ===== */
    .page-wrapper {
      max-width: 720px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 3rem;
      flex: 1;
    }

    .tool-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .tool-header h1 {
      font-size: 2rem;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
      letter-spacing: -0.03em;
      transition: color 0.3s ease;
    }

    .tool-header h1 i {
      margin-right: 0.5rem;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tool-header p {
      font-size: 1rem;
      color: var(--text-secondary);
      font-weight: 400;
      line-height: 1.6;
      max-width: 520px;
      margin: 0 auto;
      transition: color 0.3s ease;
    }

    /* ===== Converter Card ===== */
    .converter-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 4px 24px var(--shadow-color);
      transition: all 0.3s ease;
      margin-bottom: 1.5rem;
    }

    .converter-card:hover { box-shadow: 0 8px 32px var(--shadow-color); }

    /* ===== Amount Input ===== */
    .input-group { margin-bottom: 1.5rem; }

    .input-label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: color 0.3s ease;
    }

    .amount-input {
      width: 100%;
      padding: 0.875rem 1rem;
      font-size: 1.5rem;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      color: var(--text-primary);
      background: var(--input-bg);
      border: 2px solid var(--border-color);
      border-radius: 12px;
      outline: none;
      transition: all 0.3s ease;
      letter-spacing: -0.01em;
    }

    .amount-input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
      background: var(--card-bg);
    }

    .amount-input::placeholder {
      color: var(--text-secondary);
      font-weight: 400;
      opacity: 0.6;
    }

    /* ===== Currency Row ===== */
    .currency-row {
      display: flex;
      align-items: flex-end;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .currency-select-group { flex: 1; min-width: 0; }

    .swap-btn-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      padding-bottom: 0.25rem;
    }

    .swap-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid var(--border-color);
      background: var(--card-bg);
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }

    .swap-btn:hover {
      border-color: var(--blue);
      color: var(--blue);
      background: rgba(59, 130, 246, 0.06);
      transform: rotate(180deg);
    }

    .swap-btn:active { transform: rotate(180deg) scale(0.92); }

    /* ===== Custom Select ===== */
    .custom-select-wrapper { position: relative; }

    .custom-select-trigger {
      width: 100%;
      padding: 0.75rem 1rem;
      font-size: 0.9375rem;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      color: var(--text-primary);
      background: var(--input-bg);
      border: 2px solid var(--border-color);
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      transition: all 0.3s ease;
      min-height: 48px;
    }

    .custom-select-trigger:hover { border-color: var(--blue); }

    .custom-select-trigger.open {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
      border-bottom-left-radius: 0;
      border-bottom-right-radius: 0;
    }

    .select-value {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      overflow: hidden;
    }

    .select-flag { font-size: 1.25rem; line-height: 1; flex-shrink: 0; }
    .select-code { font-weight: 700; font-size: 0.9375rem; }

    .select-name {
      color: var(--text-secondary);
      font-size: 0.8125rem;
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .select-chevron {
      color: var(--text-secondary);
      transition: transform 0.3s ease;
      flex-shrink: 0;
    }

    .select-chevron.open { transform: rotate(180deg); }

    /* Dropdown */
    .select-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--card-bg);
      border: 2px solid var(--blue);
      border-top: none;
      border-bottom-left-radius: 12px;
      border-bottom-right-radius: 12px;
      box-shadow: var(--dropdown-shadow);
      z-index: 50;
      max-height: 280px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      animation: dropdownIn 0.2s ease;
    }

    @keyframes dropdownIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .select-search {
      padding: 0.625rem 0.875rem;
      border: none;
      border-bottom: 1px solid var(--border-color);
      background: var(--input-bg);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      outline: none;
      transition: background-color 0.3s ease;
    }

    .select-search::placeholder { color: var(--text-secondary); }

    .select-options { overflow-y: auto; flex: 1; }

    .select-option {
      padding: 0.625rem 0.875rem;
      display: flex;
      align-items: center;
      gap: 0.625rem;
      cursor: pointer;
      transition: background-color 0.15s ease;
      font-size: 0.875rem;
    }

    .select-option:hover { background: var(--hover-bg); }

    .select-option.selected {
      background: rgba(59, 130, 246, 0.08);
      color: var(--blue);
    }

    .select-option .opt-flag { font-size: 1.2rem; flex-shrink: 0; }
    .select-option .opt-code { font-weight: 700; min-width: 40px; }

    .select-option .opt-name {
      color: var(--text-secondary);
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ===== Action Buttons ===== */
    .action-row { display: flex; gap: 0.75rem; }

    .btn-convert {
      flex: 1;
      padding: 0.875rem 1.5rem;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      color: #ffffff;
      background: linear-gradient(135deg, var(--blue), var(--blue-dark));
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: all 0.3s ease;
      min-height: 52px;
    }

    .btn-convert:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(37, 99, 235, 0.35);
    }

    .btn-convert:active { transform: translateY(0); }

    .btn-convert:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-reset {
      padding: 0.875rem 1.25rem;
      font-size: 0.9375rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      color: var(--text-secondary);
      background: var(--input-bg);
      border: 2px solid var(--border-color);
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: all 0.3s ease;
      min-height: 52px;
    }

    .btn-reset:hover {
      border-color: var(--red);
      color: var(--red);
      background: rgba(239, 68, 68, 0.04);
    }

    /* ===== Result Card ===== */
    .result-card {
      background: var(--result-bg);
      border: 1px solid var(--result-border);
      border-radius: 16px;
      padding: 1.75rem 2rem;
      text-align: center;
      transition: all 0.3s ease;
      margin-bottom: 1.5rem;
      animation: resultIn 0.4s ease;
    }

    @keyframes resultIn {
      from { opacity: 0; transform: translateY(12px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .result-main {
      font-size: 1.15rem;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 0.375rem;
      transition: color 0.3s ease;
    }

    .result-value {
      font-size: 2rem;
      font-weight: 800;
      color: var(--green);
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
      word-break: break-word;
    }

    .result-meta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      flex-wrap: wrap;
    }

    .result-rate {
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 0.375rem;
      transition: color 0.3s ease;
    }

    .result-rate i { color: var(--blue); font-size: 0.75rem; }

    .result-updated {
      font-size: 0.8125rem;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 0.375rem;
      transition: color 0.3s ease;
    }

    .result-updated i { color: var(--purple); font-size: 0.75rem; }

    .cached-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      background: rgba(168, 85, 247, 0.1);
      color: var(--purple);
      font-size: 0.6875rem;
      font-weight: 600;
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    /* ===== Quick Rates Table ===== */
    .rates-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 4px 24px var(--shadow-color);
      transition: all 0.3s ease;
      margin-bottom: 1.5rem;
    }

    .rates-card h3 {
      font-size: 0.9375rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: color 0.3s ease;
    }

    .rates-card h3 i { color: var(--purple); font-size: 0.875rem; }

    .rates-table { width: 100%; border-collapse: collapse; }

    .rates-table tr {
      border-bottom: 1px solid var(--border-color);
      transition: background-color 0.15s ease;
      cursor: pointer;
    }

    .rates-table tr:last-child { border-bottom: none; }
    .rates-table tr:hover { background: var(--hover-bg); }

    .rates-table td {
      padding: 0.625rem 0.5rem;
      font-size: 0.875rem;
      transition: color 0.3s ease;
    }

    .rates-table .rt-amount { font-weight: 600; color: var(--text-primary); }
    .rates-table .rt-from { color: var(--text-secondary); font-weight: 500; }
    .rates-table .rt-eq { color: var(--text-secondary); text-align: center; width: 30px; }
    .rates-table .rt-result { font-weight: 700; color: var(--green); text-align: right; }
    .rates-table .rt-to { color: var(--text-secondary); text-align: right; font-weight: 500; }

    /* ===== Error Banner ===== */
    .error-banner {
      background: rgba(239, 68, 68, 0.06);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      animation: resultIn 0.3s ease;
    }

    .error-banner i { color: var(--red); font-size: 1.1rem; flex-shrink: 0; }

    .error-banner p { flex: 1; font-size: 0.875rem; font-weight: 500; color: var(--red); }

    .error-banner button {
      padding: 0.375rem 0.75rem;
      font-size: 0.8125rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      color: var(--red);
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    .error-banner button:hover { background: rgba(239, 68, 68, 0.15); }

    /* ===== Loading Skeleton ===== */
    .skeleton {
      position: relative;
      overflow: hidden;
      background: var(--input-bg);
      border-radius: 12px;
    }

    .skeleton::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    /* ===== Footer ===== */
    .footer {
      background: #111827;
      border-top: 1px solid #1e293b;
      padding: 1.5rem;
      text-align: center;
      margin-top: auto;
    }

    .footer p { color: #94a3b8; font-size: 0.8125rem; font-weight: 400; }

    /* ===== Spinner ===== */
    .spinner { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* Hidden helper */
    .hidden { display: none !important; }

    /* ===== Scrollbar ===== */
    .select-options::-webkit-scrollbar { width: 6px; }
    .select-options::-webkit-scrollbar-track { background: transparent; }
    .select-options::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }

    /* ===== Responsive ===== */
    @media (max-width: 640px) {
      .page-wrapper { padding: 1.5rem 1rem 2rem; }
      .tool-header h1 { font-size: 1.5rem; }
      .tool-header p { font-size: 0.875rem; }
      .converter-card { padding: 1.25rem; }

      .currency-row {
        flex-direction: column;
        align-items: stretch;
        gap: 0;
      }

      .swap-btn-wrapper { padding: 0.75rem 0; }
      .swap-btn:hover { transform: rotate(90deg); }
      .amount-input { font-size: 1.25rem; }
      .result-card { padding: 1.25rem; }
      .result-value { font-size: 1.5rem; }
      .result-meta { flex-direction: column; gap: 0.5rem; }
      .action-row { flex-direction: column; }
      .back-link span { display: none; }
      .header { padding: 0 1rem; }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <!-- ===== HEADER ===== -->
    <header class="header">
      <a class="logo" href="index.html">
        <span class="logo-passion">Passion</span>
        <span class="logo-tools">Tools</span>
      </a>
      <div class="header-actions">
        <a class="back-link" href="index.html">
          <i class="fa-solid fa-arrow-left"></i>
          <span>Back to Tools</span>
        </a>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>
      </div>
    </header>

    <!-- ===== MAIN ===== -->
    <main class="page-wrapper">
      <!-- Tool Header -->
      <div class="tool-header">
        <h1><i class="fa-solid fa-coins"></i>Currency Converter</h1>
        <p>Fast, accurate, and global currency conversion with real-time exchange rates.</p>
      </div>

      <!-- Error Banner -->
      <div class="error-banner hidden" id="errorBanner">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <p id="errorMessage"></p>
        <button id="retryBtn"><i class="fa-solid fa-rotate-right"></i> Retry</button>
      </div>

      <!-- Converter Card -->
      <div class="converter-card">
        <!-- Amount -->
        <div class="input-group">
          <label class="input-label">
            <i class="fa-solid fa-calculator" style="margin-right:0.375rem;opacity:0.7"></i>
            Amount
          </label>
          <input type="number" class="amount-input" id="amountInput" value="1" placeholder="Enter amount..." min="0" step="any" />
        </div>

        <!-- Currency Row -->
        <div class="currency-row">
          <!-- FROM -->
          <div class="currency-select-group">
            <label class="input-label">From</label>
            <div class="custom-select-wrapper" id="fromWrapper">
              <button type="button" class="custom-select-trigger" id="fromTrigger">
                <span class="select-value" id="fromValue"></span>
                <i class="fa-solid fa-chevron-down select-chevron" id="fromChevron"></i>
              </button>
              <div class="select-dropdown hidden" id="fromDropdown">
                <input type="text" class="select-search" id="fromSearch" placeholder="Search currency..." />
                <div class="select-options" id="fromOptions"></div>
              </div>
            </div>
          </div>

          <!-- SWAP -->
          <div class="swap-btn-wrapper">
            <button class="swap-btn" id="swapBtn" title="Swap currencies" aria-label="Swap currencies">
              <i class="fa-solid fa-arrow-right-arrow-left"></i>
            </button>
          </div>

          <!-- TO -->
          <div class="currency-select-group">
            <label class="input-label">To</label>
            <div class="custom-select-wrapper" id="toWrapper">
              <button type="button" class="custom-select-trigger" id="toTrigger">
                <span class="select-value" id="toValue"></span>
                <i class="fa-solid fa-chevron-down select-chevron" id="toChevron"></i>
              </button>
              <div class="select-dropdown hidden" id="toDropdown">
                <input type="text" class="select-search" id="toSearch" placeholder="Search currency..." />
                <div class="select-options" id="toOptions"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="action-row">
          <button class="btn-convert" id="convertBtn">
            <i class="fa-solid fa-bolt"></i>
            Convert Now
          </button>
          <button class="btn-reset" id="resetBtn">
            <i class="fa-solid fa-rotate-left"></i>
            Reset
          </button>
        </div>
      </div>

      <!-- Result Card -->
      <div class="result-card hidden" id="resultCard">
        <div class="result-main" id="resultMain"></div>
        <div class="result-value" id="resultValue"></div>
        <div class="result-meta" id="resultMeta"></div>
      </div>

      <!-- Loading Skeleton -->
      <div class="result-card hidden" id="loadingSkeleton" style="opacity:0.6">
        <div class="skeleton" style="height:20px;width:60%;margin:0 auto 0.75rem"></div>
        <div class="skeleton" style="height:32px;width:80%;margin:0 auto 1rem"></div>
        <div class="skeleton" style="height:14px;width:50%;margin:0 auto"></div>
      </div>

      <!-- Quick Reference Table -->
      <div class="rates-card hidden" id="ratesCard">
        <h3><i class="fa-solid fa-table-list"></i><span id="ratesTitle"></span></h3>
        <table class="rates-table">
          <tbody id="ratesBody"></tbody>
        </table>
      </div>
    </main>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
      <p>&copy; 2026 PassionTools. Secure client-side processing.</p>
    </footer>
  </div>

  <script>
    // ============================
    // CURRENCY DATA
    // ============================
    const currencies = [
      { code: 'USD', name: 'US Dollar', symbol: '$', flag: '🇺🇸' },
      { code: 'EUR', name: 'Euro', symbol: '€', flag: '🇪🇺' },
      { code: 'GBP', name: 'British Pound', symbol: '£', flag: '🇬🇧' },
      { code: 'JPY', name: 'Japanese Yen', symbol: '¥', flag: '🇯🇵' },
      { code: 'AUD', name: 'Australian Dollar', symbol: 'A$', flag: '🇦🇺' },
      { code: 'CAD', name: 'Canadian Dollar', symbol: 'C$', flag: '🇨🇦' },
      { code: 'CHF', name: 'Swiss Franc', symbol: 'CHF', flag: '🇨🇭' },
      { code: 'CNY', name: 'Chinese Yuan', symbol: '¥', flag: '🇨🇳' },
      { code: 'INR', name: 'Indian Rupee', symbol: '₹', flag: '🇮🇳' },
      { code: 'MXN', name: 'Mexican Peso', symbol: 'MX$', flag: '🇲🇽' },
      { code: 'BRL', name: 'Brazilian Real', symbol: 'R$', flag: '🇧🇷' },
      { code: 'KRW', name: 'South Korean Won', symbol: '₩', flag: '🇰🇷' },
      { code: 'SGD', name: 'Singapore Dollar', symbol: 'S$', flag: '🇸🇬' },
      { code: 'HKD', name: 'Hong Kong Dollar', symbol: 'HK$', flag: '🇭🇰' },
      { code: 'NOK', name: 'Norwegian Krone', symbol: 'kr', flag: '🇳🇴' },
      { code: 'SEK', name: 'Swedish Krona', symbol: 'kr', flag: '🇸🇪' },
      { code: 'DKK', name: 'Danish Krone', symbol: 'kr', flag: '🇩🇰' },
      { code: 'NZD', name: 'New Zealand Dollar', symbol: 'NZ$', flag: '🇳🇿' },
      { code: 'ZAR', name: 'South African Rand', symbol: 'R', flag: '🇿🇦' },
      { code: 'RUB', name: 'Russian Ruble', symbol: '₽', flag: '🇷🇺' },
      { code: 'TRY', name: 'Turkish Lira', symbol: '₺', flag: '🇹🇷' },
      { code: 'PLN', name: 'Polish Zloty', symbol: 'zł', flag: '🇵🇱' },
      { code: 'THB', name: 'Thai Baht', symbol: '฿', flag: '🇹🇭' },
      { code: 'IDR', name: 'Indonesian Rupiah', symbol: 'Rp', flag: '🇮🇩' },
      { code: 'MYR', name: 'Malaysian Ringgit', symbol: 'RM', flag: '🇲🇾' },
      { code: 'PHP', name: 'Philippine Peso', symbol: '₱', flag: '🇵🇭' },
      { code: 'CZK', name: 'Czech Koruna', symbol: 'Kč', flag: '🇨🇿' },
      { code: 'ILS', name: 'Israeli Shekel', symbol: '₪', flag: '🇮🇱' },
      { code: 'CLP', name: 'Chilean Peso', symbol: 'CLP$', flag: '🇨🇱' },
      { code: 'AED', name: 'UAE Dirham', symbol: 'د.إ', flag: '🇦🇪' },
      { code: 'SAR', name: 'Saudi Riyal', symbol: '﷼', flag: '🇸🇦' },
      { code: 'TWD', name: 'Taiwan Dollar', symbol: 'NT$', flag: '🇹🇼' },
      { code: 'ARS', name: 'Argentine Peso', symbol: 'AR$', flag: '🇦🇷' },
      { code: 'EGP', name: 'Egyptian Pound', symbol: 'E£', flag: '🇪🇬' },
      { code: 'NGN', name: 'Nigerian Naira', symbol: '₦', flag: '🇳🇬' },
      { code: 'PKR', name: 'Pakistani Rupee', symbol: '₨', flag: '🇵🇰' },
      { code: 'VND', name: 'Vietnamese Dong', symbol: '₫', flag: '🇻🇳' },
      { code: 'BDT', name: 'Bangladeshi Taka', symbol: '৳', flag: '🇧🇩' },
      { code: 'HUF', name: 'Hungarian Forint', symbol: 'Ft', flag: '🇭🇺' },
      { code: 'RON', name: 'Romanian Leu', symbol: 'lei', flag: '🇷🇴' },
    ];

    const currencyMap = {};
    currencies.forEach(c => { currencyMap[c.code] = c; });

    // ============================
    // STATE
    // ============================
    let fromCurrency = 'USD';
    let toCurrency = 'EUR';
    let rates = {};
    let isLoading = false;
    let lastUpdated = null;
    let isFromCache = false;
    let debounceTimer = null;

    // ============================
    // DOM REFERENCES
    // ============================
    const $ = id => document.getElementById(id);
    const amountInput = $('amountInput');
    const fromTrigger = $('fromTrigger');
    const fromValue = $('fromValue');
    const fromChevron = $('fromChevron');
    const fromDropdown = $('fromDropdown');
    const fromSearch = $('fromSearch');
    const fromOptions = $('fromOptions');
    const fromWrapper = $('fromWrapper');
    const toTrigger = $('toTrigger');
    const toValue = $('toValue');
    const toChevron = $('toChevron');
    const toDropdown = $('toDropdown');
    const toSearch = $('toSearch');
    const toOptions = $('toOptions');
    const toWrapper = $('toWrapper');
    const swapBtn = $('swapBtn');
    const convertBtn = $('convertBtn');
    const resetBtn = $('resetBtn');
    const resultCard = $('resultCard');
    const resultMain = $('resultMain');
    const resultValue = $('resultValue');
    const resultMeta = $('resultMeta');
    const loadingSkeleton = $('loadingSkeleton');
    const errorBanner = $('errorBanner');
    const errorMessage = $('errorMessage');
    const retryBtn = $('retryBtn');
    const ratesCard = $('ratesCard');
    const ratesTitle = $('ratesTitle');
    const ratesBody = $('ratesBody');
    const themeToggle = $('themeToggle');

    // ============================
    // CACHE (LocalStorage, 30 min)
    // ============================
    const CACHE_PREFIX = 'currxchange_rates_';
    const CACHE_DURATION = 30 * 60 * 1000;

    function getCachedRates(base) {
      try {
        const raw = localStorage.getItem(CACHE_PREFIX + base);
        if (!raw) return null;
        const cached = JSON.parse(raw);
        if (Date.now() - cached.timestamp > CACHE_DURATION) {
          localStorage.removeItem(CACHE_PREFIX + base);
          return null;
        }
        return cached;
      } catch { return null; }
    }

    function setCachedRates(base, ratesData) {
      try {
        localStorage.setItem(CACHE_PREFIX + base, JSON.stringify({
          rates: ratesData,
          timestamp: Date.now(),
          base
        }));
      } catch { /* storage full — ignore */ }
    }

    // ============================
    // FORMATTING (Intl.NumberFormat)
    // ============================
    function formatCurrency(value, code) {
      try {
        return new Intl.NumberFormat('en-US', {
          style: 'currency',
          currency: code,
          minimumFractionDigits: 2,
          maximumFractionDigits: 4,
        }).format(value);
      } catch {
        return code + ' ' + value.toFixed(2);
      }
    }

    function formatNumber(value, decimals = 2) {
      return new Intl.NumberFormat('en-US', {
        minimumFractionDigits: decimals,
        maximumFractionDigits: decimals,
      }).format(value);
    }

    function formatRate(rate) {
      if (rate >= 1000) return formatNumber(rate, 2);
      if (rate >= 1) return formatNumber(rate, 4);
      return formatNumber(rate, 6);
    }

    function formatTime(d) {
      return d.toLocaleTimeString('en-US', {
        hour: '2-digit', minute: '2-digit', second: '2-digit'
      });
    }

    // ============================
    // THEME
    // ============================
    function getInitialTheme() {
      try {
        const stored = localStorage.getItem('pt-theme');
        if (stored === 'dark' || stored === 'light') return stored;
      } catch {}
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }

    let currentTheme = getInitialTheme();

    function applyTheme() {
      document.documentElement.setAttribute('data-theme', currentTheme);
      themeToggle.textContent = currentTheme === 'light' ? '🌙' : '☀️';
      try { localStorage.setItem('pt-theme', currentTheme); } catch {}
    }

    themeToggle.addEventListener('click', () => {
      currentTheme = currentTheme === 'light' ? 'dark' : 'light';
      applyTheme();
    });

    applyTheme();

    // ============================
    // CURRENCY SELECTOR RENDERING
    // ============================
    function renderSelectorValue(valueEl, code) {
      const info = currencyMap[code];
      if (!info) return;
      valueEl.innerHTML = `
        <span class="select-flag">${info.flag}</span>
        <span class="select-code">${info.code}</span>
        <span class="select-name">— ${info.name}</span>
      `;
    }

    function renderOptions(optionsEl, selectedCode, searchQuery) {
      const q = (searchQuery || '').toLowerCase();
      const filtered = currencies.filter(c =>
        c.code.toLowerCase().includes(q) ||
        c.name.toLowerCase().includes(q) ||
        c.symbol.includes(q)
      );

      if (filtered.length === 0) {
        optionsEl.innerHTML = '<div style="padding:1rem;text-align:center;color:var(--text-secondary);font-size:0.875rem">No currencies found</div>';
        return;
      }

      optionsEl.innerHTML = filtered.map(c => `
        <div class="select-option ${c.code === selectedCode ? 'selected' : ''}" data-code="${c.code}">
          <span class="opt-flag">${c.flag}</span>
          <span class="opt-code">${c.code}</span>
          <span class="opt-name">${c.name}</span>
        </div>
      `).join('');
    }

    // ============================
    // DROPDOWN LOGIC
    // ============================
    function openDropdown(trigger, chevron, dropdown, searchInput, optionsEl, selectedCode) {
      trigger.classList.add('open');
      chevron.classList.add('open');
      dropdown.classList.remove('hidden');
      searchInput.value = '';
      renderOptions(optionsEl, selectedCode, '');
      setTimeout(() => searchInput.focus(), 50);
    }

    function closeDropdown(trigger, chevron, dropdown, searchInput) {
      trigger.classList.remove('open');
      chevron.classList.remove('open');
      dropdown.classList.add('hidden');
      searchInput.value = '';
    }

    // FROM selector
    let fromOpen = false;
    fromTrigger.addEventListener('click', () => {
      fromOpen = !fromOpen;
      if (fromOpen) {
        openDropdown(fromTrigger, fromChevron, fromDropdown, fromSearch, fromOptions, fromCurrency);
        // close the other
        if (toOpen) {
          toOpen = false;
          closeDropdown(toTrigger, toChevron, toDropdown, toSearch);
        }
      } else {
        closeDropdown(fromTrigger, fromChevron, fromDropdown, fromSearch);
      }
    });

    fromSearch.addEventListener('input', () => {
      renderOptions(fromOptions, fromCurrency, fromSearch.value);
    });

    fromOptions.addEventListener('click', (e) => {
      const option = e.target.closest('.select-option');
      if (!option) return;
      fromCurrency = option.dataset.code;
      renderSelectorValue(fromValue, fromCurrency);
      fromOpen = false;
      closeDropdown(fromTrigger, fromChevron, fromDropdown, fromSearch);
      fetchRates();
    });

    // TO selector
    let toOpen = false;
    toTrigger.addEventListener('click', () => {
      toOpen = !toOpen;
      if (toOpen) {
        openDropdown(toTrigger, toChevron, toDropdown, toSearch, toOptions, toCurrency);
        // close the other
        if (fromOpen) {
          fromOpen = false;
          closeDropdown(fromTrigger, fromChevron, fromDropdown, fromSearch);
        }
      } else {
        closeDropdown(toTrigger, toChevron, toDropdown, toSearch);
      }
    });

    toSearch.addEventListener('input', () => {
      renderOptions(toOptions, toCurrency, toSearch.value);
    });

    toOptions.addEventListener('click', (e) => {
      const option = e.target.closest('.select-option');
      if (!option) return;
      toCurrency = option.dataset.code;
      renderSelectorValue(toValue, toCurrency);
      toOpen = false;
      closeDropdown(toTrigger, toChevron, toDropdown, toSearch);
      updateResult();
    });

    // Close dropdowns on outside click
    document.addEventListener('mousedown', (e) => {
      if (fromOpen && !fromWrapper.contains(e.target)) {
        fromOpen = false;
        closeDropdown(fromTrigger, fromChevron, fromDropdown, fromSearch);
      }
      if (toOpen && !toWrapper.contains(e.target)) {
        toOpen = false;
        closeDropdown(toTrigger, toChevron, toDropdown, toSearch);
      }
    });

    // ============================
    // API FETCH (async/await + try/catch)
    // ============================
    const API_URL = 'https://api.exchangerate-api.com/v4/latest/';

    async function fetchRates(forceRefresh = false) {
      isLoading = true;
      showLoading();
      hideError();

      // Check cache first
      if (!forceRefresh) {
        const cached = getCachedRates(fromCurrency);
        if (cached) {
          rates = cached.rates;
          lastUpdated = new Date(cached.timestamp);
          isFromCache = true;
          isLoading = false;
          hideLoading();
          updateResult();
          return;
        }
      }

      try {
        const response = await fetch(API_URL + fromCurrency);

        if (!response.ok) {
          throw new Error(
            response.status === 429
              ? 'Rate limit exceeded. Please try again later.'
              : `Failed to fetch rates (HTTP ${response.status})`
          );
        }

        const data = await response.json();

        if (!data.rates) {
          throw new Error('Invalid response format from exchange rate API');
        }

        rates = data.rates;
        setCachedRates(fromCurrency, data.rates);
        lastUpdated = new Date();
        isFromCache = false;
      } catch (err) {
        // Fallback to cache on error
        const cached = getCachedRates(fromCurrency);
        if (cached) {
          rates = cached.rates;
          lastUpdated = new Date(cached.timestamp);
          isFromCache = true;
          showError('Using cached rates (network unavailable)');
        } else {
          showError(err.message || 'An unexpected error occurred while fetching rates');
        }
      } finally {
        isLoading = false;
        hideLoading();
        updateResult();
      }
    }

    // ============================
    // UI UPDATE
    // ============================
    function getNumericAmount() {
      const n = parseFloat(amountInput.value);
      return isNaN(n) || n < 0 ? 0 : n;
    }

    function updateResult() {
      const amount = getNumericAmount();
      const rate = rates[toCurrency] || 0;
      const converted = amount * rate;
      const fromInfo = currencyMap[fromCurrency];
      const toInfo = currencyMap[toCurrency];

      if (rate > 0 && amount > 0 && !isLoading) {
        // Show result
        resultMain.textContent = `${fromInfo ? fromInfo.flag + ' ' : ''}${formatCurrency(amount, fromCurrency)} =`;
        resultValue.textContent = `${toInfo ? toInfo.flag + ' ' : ''}${formatCurrency(converted, toCurrency)}`;

        // Meta
        let metaHTML = `
          <span class="result-rate">
            <i class="fa-solid fa-chart-line"></i>
            1 ${fromCurrency} = ${formatRate(rate)} ${toCurrency}
          </span>
        `;
        if (lastUpdated) {
          metaHTML += `
            <span class="result-updated">
              <i class="fa-regular fa-clock"></i>
              Updated ${formatTime(lastUpdated)}
            </span>
          `;
        }
        if (isFromCache) {
          metaHTML += `
            <span class="cached-badge">
              <i class="fa-solid fa-database"></i>
              Cached
            </span>
          `;
        }
        resultMeta.innerHTML = metaHTML;
        resultCard.classList.remove('hidden');
        // Re-trigger animation
        resultCard.style.animation = 'none';
        resultCard.offsetHeight; // force reflow
        resultCard.style.animation = '';

        // Quick Reference Table
        updateQuickTable(rate);
      } else {
        resultCard.classList.add('hidden');
        ratesCard.classList.add('hidden');
      }
    }

    function updateQuickTable(rate) {
      const quickAmounts = [1, 10, 100, 1000, 5000, 10000];
      ratesTitle.textContent = `Quick Reference — ${fromCurrency} to ${toCurrency}`;

      ratesBody.innerHTML = quickAmounts.map(amt => `
        <tr data-amount="${amt}">
          <td class="rt-amount">${new Intl.NumberFormat('en-US').format(amt)}</td>
          <td class="rt-from">${fromCurrency}</td>
          <td class="rt-eq">=</td>
          <td class="rt-result">${new Intl.NumberFormat('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(amt * rate)}</td>
          <td class="rt-to">${toCurrency}</td>
        </tr>
      `).join('');

      ratesCard.classList.remove('hidden');
    }

    // Quick table row clicks
    ratesBody.addEventListener('click', (e) => {
      const row = e.target.closest('tr');
      if (!row) return;
      const amt = row.dataset.amount;
      if (amt) {
        amountInput.value = amt;
        updateResult();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });

    // ============================
    // SHOW / HIDE HELPERS
    // ============================
    function showLoading() {
      loadingSkeleton.classList.remove('hidden');
      resultCard.classList.add('hidden');
      ratesCard.classList.add('hidden');
      convertBtn.disabled = true;
      convertBtn.innerHTML = '<i class="fa-solid fa-spinner spinner"></i> Loading Rates...';
    }

    function hideLoading() {
      loadingSkeleton.classList.add('hidden');
      convertBtn.disabled = false;
      convertBtn.innerHTML = '<i class="fa-solid fa-bolt"></i> Convert Now';
    }

    function showError(msg) {
      errorMessage.textContent = msg;
      errorBanner.classList.remove('hidden');
    }

    function hideError() {
      errorBanner.classList.add('hidden');
    }

    // ============================
    // EVENT LISTENERS
    // ============================

    // Debounced input
    amountInput.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        updateResult();
      }, 250);
    });

    // Swap
    swapBtn.addEventListener('click', () => {
      const tmp = fromCurrency;
      fromCurrency = toCurrency;
      toCurrency = tmp;
      renderSelectorValue(fromValue, fromCurrency);
      renderSelectorValue(toValue, toCurrency);
      fetchRates();
    });

    // Convert
    convertBtn.addEventListener('click', () => {
      updateResult();
    });

    // Reset
    resetBtn.addEventListener('click', () => {
      amountInput.value = '1';
      fromCurrency = 'USD';
      toCurrency = 'EUR';
      renderSelectorValue(fromValue, fromCurrency);
      renderSelectorValue(toValue, toCurrency);
      fetchRates();
    });

    // Retry
    retryBtn.addEventListener('click', () => {
      fetchRates(true);
    });

    // ============================
    // INIT
    // ============================
    renderSelectorValue(fromValue, fromCurrency);
    renderSelectorValue(toValue, toCurrency);
    fetchRates();
  </script>
</body>
</html>
