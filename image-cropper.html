<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Cropper - Passion Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">
    
    <style>
        :root {
            /* Brand Colors */
            --red: #ef4444;
            --purple: #a855f7;
            --blue: #3b82f6; 
            --blue-dark: #2563eb;
            --green: #22c55e;
            
            /* Light Mode UI Colors */
            --bg-color: #f9fafb;
            --card-bg: #ffffff;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --border-color: #e5e7eb;
            --hover-gray: #f3f4f6;
            --header-bg: rgba(255, 255, 255, 0.95);
            --footer-bg: #111827;
            --upload-bg: #fafafa;
            --preview-bg: #f3f4f6;
            --logo-passion: #1f2937;
            
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --radius: 16px;
            --transition: all 0.3s ease;
        }

        /* Dark Mode Override */
        [data-theme="dark"] {
            --bg-color: #020617;
            --card-bg: #111827;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: #1e293b;
            --hover-gray: #1e293b;
            --header-bg: rgba(15, 23, 42, 0.95);
            --footer-bg: #020617;
            --upload-bg: #0f172a;
            --preview-bg: #1e293b;
            --logo-passion: #f8fafc;
            
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
        }

        /* --- Header --- */
        header {
            background-color: var(--header-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            transition: var(--transition);
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-text { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; text-decoration: none; display: block;}
        .logo-passion { color: var(--logo-passion); transition: color var(--transition); }
        .logo-tools {
            background: linear-gradient(to right, var(--red), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 500;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-link:hover { color: var(--red); }

        .theme-toggle {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: var(--transition);
        }
        .theme-toggle:hover { background: var(--hover-gray); }

        /* --- Tool Layout --- */
        .tool-container {
            max-width: 900px; /* Slightly wider for cropper */
            width: 100%;
            margin: 40px auto;
            padding: 0 20px;
            flex: 1;
        }

        .tool-header { text-align: center; margin-bottom: 30px; }
        .tool-title { font-size: 32px; font-weight: 800; margin-bottom: 12px; }
        .tool-subtitle { color: var(--text-secondary); font-size: 16px; transition: color var(--transition); }

        .cropper-card {
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            padding: 40px;
            border: 1px solid var(--border-color);
            transition: var(--transition);
        }

        /* --- Upload Area --- */
        .upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 16px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            background-color: var(--upload-bg);
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--blue);
            background-color: rgba(59, 130, 246, 0.05);
        }

        .upload-icon { font-size: 48px; color: var(--blue); margin-bottom: 16px; }
        .upload-text { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
        .upload-subtext { color: var(--text-secondary); font-size: 14px; }
        #fileInput { display: none; }

        /* --- Workspace --- */
        .workspace { display: none; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Image Container for Cropper.js */
        .img-container {
            max-height: 500px;
            width: 100%;
            margin-bottom: 24px;
            background-color: var(--preview-bg);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid var(--border-color);
        }
        
        .img-container img {
            display: block;
            max-width: 100%; /* Required for Cropper.js */
        }

        /* Result Container (After Cropping) */
        .result-container {
            display: none;
            text-align: center;
            margin-bottom: 24px;
            padding: 20px;
            background: var(--preview-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }
        
        .result-container img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 8px;
            box-shadow: var(--shadow-md);
        }

        /* --- Controls --- */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
            justify-content: center;
        }

        .tool-btn {
            background-color: var(--card-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tool-btn:hover, .tool-btn.active {
            background-color: rgba(59, 130, 246, 0.1);
            border-color: var(--blue);
            color: var(--blue);
        }

        /* Actions */
        .action-buttons { display: flex; gap: 16px; margin-top: 24px; flex-wrap: wrap; }

        .btn-action {
            flex: 1;
            min-width: 150px;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-crop {
            background-color: var(--blue);
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        .btn-crop:hover { background-color: var(--blue-dark); transform: translateY(-2px); }

        .btn-download {
            background-color: var(--green);
            color: white;
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
            text-decoration: none;
        }
        .btn-download:hover { background-color: #16a34a; transform: translateY(-2px); }

        .btn-reset {
            background-color: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        .btn-reset:hover {
            background-color: var(--hover-gray);
            border-color: var(--text-secondary);
        }

        /* Success Message */
        .status-msg {
            text-align: center;
            margin-bottom: 20px;
            padding: 12px;
            border-radius: 8px;
            display: none;
            font-weight: 500;
            color: var(--text-primary);
        }
        .status-msg.success {
            background-color: rgba(34, 197, 94, 0.1);
            color: var(--green);
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Footer */
        footer {
            background-color: var(--footer-bg);
            color: #94a3b8;
            padding: 40px 0;
            margin-top: auto;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.05);
            transition: var(--transition);
        }

        @media (max-width: 600px) {
            .cropper-card { padding: 24px 20px; }
            .tool-title { font-size: 26px; }
            .upload-area { padding: 40px 16px; }
            .logo-text { font-size: 20px; }
            .nav-link span { display: none; } 
            .action-buttons { flex-direction: column; }
            .btn-action { width: 100%; }
            .toolbar { justify-content: space-between; }
            .tool-btn { flex: 1; justify-content: center; padding: 10px 8px; font-size: 12px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <div class="header-content">
                <a href="index.html" class="logo-text">
                    <span class="logo-passion">Passion</span><span class="logo-tools">Tools</span>
                </a>

                <div class="header-actions">
                    <a href="index.html" class="nav-link" title="Back to Tools">
                        <i class="fas fa-arrow-left"></i> <span>Back to Tools</span>
                    </a>
                    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme" title="Toggle theme">🌙</button>
                </div>
            </div>
        </div>
    </header>

    <main class="tool-container">
        <div class="tool-header">
            <h1 class="tool-title">Image Cropper</h1>
            <p class="tool-subtitle">Crop your images perfectly. Supports freeform and fixed aspect ratios.</p>
        </div>

        <div class="cropper-card">
            
            <div class="upload-area" id="dropZone">
                <i class="fas fa-crop-alt upload-icon"></i>
                <div class="upload-text">Click or Drag & Drop Image</div>
                <div class="upload-subtext">Supports JPG, PNG, WEBP (Max 20MB)</div>
                <input type="file" id="fileInput" accept="image/png, image/jpeg, image/webp">
            </div>

            <div class="workspace" id="workspace">
                
                <div id="cropperUI">
                    <div class="toolbar" id="ratioToolbar">
                        <button class="tool-btn active" data-ratio="NaN"><i class="fas fa-expand-arrows-alt"></i> Free</button>
                        <button class="tool-btn" data-ratio="1"><i class="fas fa-square"></i> 1:1</button>
                        <button class="tool-btn" data-ratio="1.3333333333333333"><i class="fas fa-image"></i> 4:3</button>
                        <button class="tool-btn" data-ratio="1.7777777777777777"><i class="fas fa-tv"></i> 16:9</button>
                        <button class="tool-btn" data-ratio="0.5625"><i class="fas fa-mobile-alt"></i> 9:16</button>
                    </div>

                    <div class="img-container">
                        <img id="imageToCrop" src="" alt="Picture">
                    </div>
                    
                    <div class="action-buttons">
                        <button class="btn-action btn-crop" id="btnCrop">
                            <i class="fas fa-crop-alt"></i> Crop Image
                        </button>
                        <button class="btn-action btn-reset" id="btnStartOver">
                            <i class="fas fa-trash-alt"></i> Cancel
                        </button>
                    </div>
                </div>

                <div id="resultUI" style="display: none;">
                    <div class="status-msg" id="statusMsg"></div>
                    
                    <div class="result-container" id="resultContainer">
                        <img id="croppedResult" src="" alt="Cropped Image">
                    </div>

                    <div class="action-buttons">
                        <a href="#" class="btn-action btn-download" id="btnDownload" download>
                            <i class="fas fa-download"></i> Download
                        </a>
                        <button class="btn-action btn-reset" id="btnEditCrop">
                            <i class="fas fa-undo"></i> Edit Crop
                        </button>
                        <button class="btn-action btn-reset" id="btnStartOverResult">
                            <i class="fas fa-redo"></i> Start Over
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Passion Tools. Secure client-side processing.</p>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
    
    <script>
        // --- 1. THEME TOGGLE LOGIC ---
        (function initTheme() {
            const saved = localStorage.getItem('pt-theme');
            if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
            updateToggleIcon();
        })();

        function updateToggleIcon() {
            const btn = document.getElementById('themeToggle');
            if (btn) btn.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '☀️' : '🌙';
        }

        document.getElementById('themeToggle').addEventListener('click', () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
            localStorage.setItem('pt-theme', isDark ? 'light' : 'dark');
            updateToggleIcon();
        });

        // --- 2. IMAGE CROPPER LOGIC ---
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const workspace = document.getElementById('workspace');
        
        const cropperUI = document.getElementById('cropperUI');
        const resultUI = document.getElementById('resultUI');
        
        const imageToCrop = document.getElementById('imageToCrop');
        const croppedResult = document.getElementById('croppedResult');
        const resultContainer = document.getElementById('resultContainer');
        
        const btnCrop = document.getElementById('btnCrop');
        const btnDownload = document.getElementById('btnDownload');
        const btnStartOver = document.getElementById('btnStartOver');
        const btnStartOverResult = document.getElementById('btnStartOverResult');
        const btnEditCrop = document.getElementById('btnEditCrop');
        
        const ratioButtons = document.querySelectorAll('.tool-btn');
        const statusMsg = document.getElementById('statusMsg');

        let cropper = null;
        let currentFile = null;

        // --- Upload Handling ---
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => {
            dropZone.addEventListener(e, (ev) => {
                ev.preventDefault();
                ev.stopPropagation();
            });
        });

        ['dragenter', 'dragover'].forEach(e => dropZone.addEventListener(e, () => dropZone.classList.add('dragover')));
        ['dragleave', 'drop'].forEach(e => dropZone.addEventListener(e, () => dropZone.classList.remove('dragover')));

        dropZone.addEventListener('drop', (e) => handleFile(e.dataTransfer.files[0]));
        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

        function handleFile(file) {
            if (!file || !file.type.match('image.*')) {
                alert("Please upload a valid image file.");
                return;
            }
            currentFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                // Set image source
                imageToCrop.src = e.target.result;
                
                // Toggle UI
                dropZone.style.display = 'none';
                workspace.style.display = 'block';
                showCropperUI();

                // Initialize Cropper
                if (cropper) { cropper.destroy(); }
                
                cropper = new Cropper(imageToCrop, {
                    viewMode: 2, // Restrict crop box to not exceed canvas size
                    background: false, // Cleaner look
                    responsive: true,
                    autoCropArea: 0.8, // Initial crop area size
                });
                
                // Reset Aspect Ratio buttons to Free
                ratioButtons.forEach(b => b.classList.remove('active'));
                ratioButtons[0].classList.add('active');
            };
            reader.readAsDataURL(file);
        }

        // --- Aspect Ratio Controls ---
        ratioButtons.forEach(btn => {
            btn.addEventListener('click', function() {
                if (!cropper) return;
                
                // UI update
                ratioButtons.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                
                // Logic update
                const ratio = parseFloat(this.getAttribute('data-ratio'));
                cropper.setAspectRatio(ratio);
            });
        });

        // --- Cropping Logic ---
        btnCrop.addEventListener('click', () => {
            if (!cropper) return;

            btnCrop.innerHTML = '<div class="spinner"></div> Cropping...';
            btnCrop.disabled = true;

            setTimeout(() => {
                // Get Cropped Canvas (preserves original resolution of the cropped area)
                const canvas = cropper.getCroppedCanvas({
                    imageSmoothingEnabled: true,
                    imageSmoothingQuality: 'high',
                });
                
                // Handle transparency if original was not PNG
                if (currentFile.type === 'image/jpeg') {
                    const bgCanvas = document.createElement('canvas');
                    bgCanvas.width = canvas.width;
                    bgCanvas.height = canvas.height;
                    const ctx = bgCanvas.getContext('2d');
                    ctx.fillStyle = '#FFFFFF';
                    ctx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
                    ctx.drawImage(canvas, 0, 0);
                    updateResult(bgCanvas.toDataURL('image/jpeg', 0.95), canvas.width, canvas.height);
                } else {
                    updateResult(canvas.toDataURL(currentFile.type), canvas.width, canvas.height);
                }

                // Restore Button State
                btnCrop.innerHTML = '<i class="fas fa-crop-alt"></i> Crop Image';
                btnCrop.disabled = false;
                
                // Switch Views
                showResultUI();

            }, 400); // Small delay for UX
        });

        function updateResult(dataUrl, width, height) {
            croppedResult.src = dataUrl;
            
            // Setup Download
            const ext = currentFile.type === 'image/png' ? 'png' : 'jpg';
            const newName = currentFile.name.split('.')[0] + `-cropped.${ext}`;
            
            btnDownload.href = dataUrl;
            btnDownload.download = newName;

            statusMsg.innerHTML = `Success! Cropped Dimensions: <strong>${width} x ${height}</strong> px`;
            statusMsg.className = 'status-msg success';
        }

        // --- View Switching & Reset ---
        function showCropperUI() {
            cropperUI.style.display = 'block';
            resultUI.style.display = 'none';
        }

        function showResultUI() {
            cropperUI.style.display = 'none';
            resultUI.style.display = 'block';
            resultContainer.style.display = 'block';
            statusMsg.style.display = 'block';
        }

        function resetEverything() {
            currentFile = null;
            fileInput.value = '';
            if (cropper) {
                cropper.destroy();
                cropper = null;
            }
            dropZone.style.display = 'block';
            workspace.style.display = 'none';
            imageToCrop.src = '';
            croppedResult.src = '';
        }

        btnStartOver.addEventListener('click', resetEverything);
        btnStartOverResult.addEventListener('click', resetEverything);
        
        btnEditCrop.addEventListener('click', () => {
            showCropperUI();
        });

    </script>
</body>
</html>
